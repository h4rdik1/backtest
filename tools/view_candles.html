<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Prop Challenge Tracker</title>
    <!-- Locked to stable v4.1.1 to prevent API mismatches on slow connections -->
    <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050508;
            --bg-card: rgba(20, 20, 30, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --bull: #22c55e;
            --bear: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass: blur(12px) saturate(180%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER / STATS BAR */
        header {
            height: 70px;
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 40px;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-left: auto;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .stat-value.up {
            color: var(--bull);
        }

        .stat-value.down {
            color: var(--bear);
        }

        .progress-container {
            width: 200px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--bull));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        /* MAIN CONTENT AREA */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* SIDEBAR */
        aside {
            width: 340px;
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: var(--glass);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .side-tabs {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            font-weight: 600;
        }

        .tab-btn.active {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent);
            color: var(--text-main);
        }

        .side-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .list-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .list-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(3px);
        }

        .list-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .card-symbol {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .card-tier {
            font-size: 0.65rem;
            background: #222;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-dim);
            font-weight: 700;
        }

        .card-tier.Aplus {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .card-details {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .side-tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .tag-short {
            background: rgba(239, 68, 68, 0.1);
            color: var(--bear);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .tag-long {
            background: rgba(34, 197, 94, 0.1);
            color: var(--bull);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .card-pnl {
            margin-left: auto;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .card-pnl.up {
            color: var(--bull);
        }

        .card-pnl.down {
            color: var(--bear);
        }

        /* CHART VIEW */
        main {
            flex: 1;
            background: var(--bg-deep);
            position: relative;
        }

        #chart-container {
            width: 100%;
            height: 100%;
        }

        .chart-controls {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 8px;
            display: flex;
            gap: 5px;
        }

        .tf-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .tf-btn.active {
            background: var(--accent);
            color: white;
        }

        /* LOAD ANIMATION */
        .loader {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                <polyline points="16 7 22 7 22 13"></polyline>
            </svg>
            SMC CHALLENGE
        </div>

        <div class="progress-container">
            <div class="stat-label" id="progress-text">Challenge Progress: 0%</div>
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="stat-group">
            <div class="stat-item">
                <div class="stat-label">Balance</div>
                <div class="stat-value" id="stat-balance">$5,000.00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total P/L</div>
                <div class="stat-value" id="stat-pnl">$0.00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="stat-wr">0.0%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Status</div>
                <div class="stat-value" id="stat-status" style="color:var(--accent)">ACTIVE</div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside>
            <div class="side-tabs">
                <button class="tab-btn active" id="tab-open" onclick="switchSideTab('open')">Open</button>
                <button class="tab-btn" id="tab-pending" onclick="switchSideTab('pending')">Pending</button>
                <button class="tab-btn" id="tab-history" onclick="switchSideTab('history')">History</button>
            </div>
            <div class="side-scroll" id="sidebar-list">
                <!-- Cards will be injected here -->
            </div>
        </aside>

        <main>
            <div class="chart-controls">
                <button class="tf-btn" onclick="setTf('5m')">5M</button>
                <button class="tf-btn active" onclick="setTf('15m')">15M</button>
                <button class="tf-btn" onclick="setTf('1h')">1H</button>
                <button class="tf-btn" onclick="setTf('4h')">4H</button>
            </div>
            <div id="chart-container"></div>
            <div id="loader" class="loader">
                <div class="spinner"></div>
                <p id="loader-msg" style="margin-top: 15px; font-size: 0.8rem; color: var(--text-dim);">Initializing
                    Chart Engine...</p>
                <button onclick="location.reload()"
                    style="margin-top: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Force
                    Reload Page</button>
            </div>
        </main>
    </div>

    <script>
        // --- GLOBAL ERROR HANDLING ---
        window.onerror = function (msg, url, line, col, error) {
            const errBox = document.getElementById('loader-msg');
            if (errBox) {
                errBox.style.color = "#ef4444";
                errBox.innerText = `JS ERROR: ${msg} (Line ${line})`;
            }
            return false;
        };

        let chart, candleSeries, volumeSeries;
        let fvgBullSeries, fvgBearSeries, obSeries;
        let priceLines = [];
        let state = {};
        let closedTrades = [];
        let activeSymbol = "BTC/USDT";
        let activeTf = "15m";
        let sideTab = "open";

        function initChart() {
            const container = document.getElementById('chart-container');
            if (!container) return;

            console.log("LightweightCharts Version Check:", typeof LightweightCharts !== 'undefined' ? "Loaded" : "Missing");

            if (typeof LightweightCharts === 'undefined') {
                document.getElementById('loader-msg').innerText = "FATAL: Library not loaded. Check internet.";
                return;
            }

            try {
                chart = LightweightCharts.createChart(container, {
                    width: container.clientWidth,
                    height: container.clientHeight || 500,
                    layout: {
                        background: { type: LightweightCharts.ColorType.Solid, color: '#050508' },
                        textColor: '#94a3b8',
                    },
                    grid: {
                        vertLines: { color: 'rgba(255,255,255,0.03)' },
                        horzLines: { color: 'rgba(255,255,255,0.03)' },
                    },
                    timeScale: { borderColor: 'rgba(255,255,255,0.08)', timeVisible: true },
                    rightPriceScale: { borderColor: 'rgba(255,255,255,0.08)' }
                });

                // Use the most compatible way to add series
                candleSeries = chart.addCandlestickSeries({
                    upColor: '#22c55e', downColor: '#ef4444', borderVisible: false,
                    wickUpColor: '#22c55e', wickDownColor: '#ef4444'
                });

                volumeSeries = chart.addHistogramSeries({
                    color: 'rgba(59, 130, 246, 0.2)',
                    priceFormat: { type: 'volume' },
                    priceScaleId: ''
                });
                volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

                const zoneOpts = { wickVisible: false, borderVisible: false, priceLineVisible: false, pane: 0 };
                fvgBullSeries = chart.addCandlestickSeries({ ...zoneOpts, upColor: 'rgba(34, 197, 94, 0.15)', downColor: 'rgba(34, 197, 94, 0.1)' });
                fvgBearSeries = chart.addCandlestickSeries({ ...zoneOpts, upColor: 'rgba(239, 68, 68, 0.15)', downColor: 'rgba(239, 68, 68, 0.1)' });
                obSeries = chart.addCandlestickSeries({ ...zoneOpts, upColor: 'rgba(59, 130, 246, 0.2)', downColor: 'rgba(59, 130, 246, 0.2)' });

                window.addEventListener('resize', () => {
                    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
                });

                console.log("Chart v4 initialized successfully.");
            } catch (err) {
                console.error("InitChart Fatal:", err);
                document.getElementById('loader-msg').innerText = "INIT ERROR: " + err.message;
            }
        }

        async function syncData() {
            console.log("Syncing challenge data...");
            try {
                const [sReq, tReq] = await Promise.all([fetch('/api/status'), fetch('/api/trades')]);
                if (!sReq.ok || !tReq.ok) throw new Error("API request failed");
                state = await sReq.json();
                closedTrades = await tReq.json();
                console.log("Data synced:", state.balance);
                updateDashboard();
                renderSidebar();
            } catch (e) { console.error("Sync failed", e); }
        }

        function updateDashboard() {
            const bal = state.balance || 5000;
            const pnl = bal - 5000;
            document.getElementById('stat-balance').innerText = `$${bal.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            document.getElementById('stat-pnl').innerText = `${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}`;
            document.getElementById('stat-pnl').className = `stat-value ${pnl >= 0 ? 'up' : 'down'}`;

            const total = state.total_trades || 0;
            const wins = state.wins || 0;
            const wr = total > 0 ? (wins / total * 100).toFixed(1) : "0.0";
            document.getElementById('stat-wr').innerText = `${wr}%`;

            // Progress
            const target = 5500;
            const floor = 4700;
            let progPercent = ((bal - 5000) / (target - 5000)) * 100;
            if (progPercent < 0) progPercent = 0;
            document.getElementById('progress-bar').style.width = `${Math.min(100, progPercent)}%`;
            document.getElementById('progress-text').innerText = `Challenge Progress: ${Math.floor(progPercent)}%`;
        }

        function renderSidebar() {
            const list = document.getElementById('sidebar-list');
            list.innerHTML = '';

            let source = [];
            if (sideTab === 'open') source = state.open_trades || [];
            else if (sideTab === 'pending') source = state.pending_trades || [];
            else source = closedTrades;

            if (source.length === 0) {
                list.innerHTML = `<div style="text-align:center; color:var(--text-dim); margin-top:40px; font-size:0.8rem;">No ${sideTab} trades found.</div>`;
                return;
            }

            source.forEach(t => {
                const card = document.createElement('div');
                card.className = `list-card ${activeSymbol === t.symbol ? 'active' : ''}`;
                const dirTag = t.direction === 'LONG' ? 'tag-long' : 'tag-short';
                const tier = t.setup_tier || "B";
                const tierClass = tier.includes('A') ? 'card-tier Aplus' : 'card-tier';

                // Result / PnL info for history
                let pnlInfo = "";
                if (sideTab === 'history') {
                    const res = t.result || (t.pnl_usd >= 0 ? 'WIN' : 'LOSS');
                    const val = t.pnl_usd || 0;
                    pnlInfo = `<span class="card-pnl ${val >= 0 ? 'up' : 'down'}">${res} ($${val > 0 ? '+' : ''}${val})</span>`;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-symbol">${t.symbol}</div>
                        <div class="${tierClass}">${tier}</div>
                    </div>
                    <div class="card-details">
                        <span class="side-tag ${dirTag}">${t.direction}</span>
                        <span>@ ${t.entry_price.toLocaleString()}</span>
                        ${pnlInfo}
                    </div>
                `;
                card.onclick = () => focusTrade(t);
                list.appendChild(card);
            });
        }

        async function focusTrade(trade) {
            activeSymbol = trade.symbol;
            renderSidebar();
            await loadCandles(trade.symbol, activeTf);
            drawPriceLines(trade);
        }

        async function loadCandles(symbol, tf) {
            console.log(`Loading candles for ${symbol} @ ${tf}...`);
            const startTime = Date.now();
            document.getElementById('loader').style.opacity = "1";
            document.getElementById('loader').style.pointerEvents = "all";
            document.getElementById('loader-msg').innerText = `Fetching ${symbol} ${tf} candles...`;

            try {
                // 1. Fetch Candles
                const cResp = await fetch(`/api/live_candles?symbol=${symbol.replace('/', '_')}&tf=${tf}`);
                const candles = await cResp.json();

                if (!Array.isArray(candles) || candles.length === 0) {
                    console.warn("No candle data received.");
                    document.getElementById('loader-msg').innerText = "No data found for this symbol/timeframe.";
                } else {
                    candles.sort((a, b) => a.time - b.time);
                    const uniqueCandles = [];
                    const seenTimes = new Set();
                    for (let c of candles) {
                        if (!seenTimes.has(c.time)) {
                            uniqueCandles.push(c);
                            seenTimes.add(c.time);
                        }
                    }

                    candleSeries.setData(uniqueCandles);
                    volumeSeries.setData(uniqueCandles.map(c => ({
                        time: c.time,
                        value: c.volume,
                        color: c.close >= c.open ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)'
                    })));

                    console.log(`Loaded ${uniqueCandles.length} candles in ${Date.now() - startTime}ms.`);
                    document.getElementById('loader-msg').innerText = `Fetching institutional zones...`;

                    // 2. Fetch Overlays (Sequential - Only after candles)
                    const oResp = await fetch(`/api/overlays?symbol=${symbol.replace('/', '_')}&tf=${tf}`);
                    const overlays = await oResp.json();

                    const bullZones = [], bearZones = [], obZones = [];
                    (overlays.fvgs || []).forEach(f => {
                        const data = { time: f.start, open: f.top, high: f.top, low: f.btm, close: f.btm };
                        if (f.type === 'bull') bullZones.push(data); else bearZones.push(data);
                    });
                    (overlays.obs || []).forEach(o => obZones.push({ time: o.start, open: o.top, high: o.top, low: o.btm, close: o.btm }));

                    fvgBullSeries.setData(bullZones);
                    fvgBearSeries.setData(bearZones);
                    obSeries.setData(obZones);
                }
                chart.timeScale().fitContent();
            } catch (e) {
                console.error("loadCandles generic error:", e);
                document.getElementById('loader-msg').innerText = "Network slow / Binance timeout.";
            }

            setTimeout(() => {
                document.getElementById('loader').style.opacity = "0";
                document.getElementById('loader').style.pointerEvents = "none";
            }, 500);
        }

        function drawPriceLines(t) {
            if (!candleSeries) return;
            priceLines.forEach(l => candleSeries.removePriceLine(l));
            priceLines = [];

            priceLines.push(candleSeries.createPriceLine({ price: t.entry_price, color: '#3b82f6', lineWidth: 2, lineStyle: 0, axisLabelVisible: true, title: 'ENTRY' }));
            priceLines.push(candleSeries.createPriceLine({ price: t.sl_price, color: '#ef4444', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: 'SL' }));
            priceLines.push(candleSeries.createPriceLine({ price: t.tp_price, color: '#22c55e', lineWidth: 2, lineStyle: 2, axisLabelVisible: true, title: 'TP' }));
        }

        function switchSideTab(tab) {
            sideTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${tab}`));
            renderSidebar();
        }

        function setTf(tf) {
            activeTf = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === tf));
            loadCandles(activeSymbol, tf);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            syncData();
            loadCandles(activeSymbol, activeTf);
            setInterval(syncData, 30000); // Sync every 30s for stability
        });
    </script>
</body>

</html>
