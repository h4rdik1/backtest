<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMC Vision - Backtest Dashboard</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d12;
            --sidebar-bg: #15151e;
            --accent-color: #3b82f6;
            --fvg-bull: rgba(34, 197, 94, 0.15);
            --fvg-bear: rgba(239, 68, 68, 0.15);
            --ob-color: rgba(59, 130, 246, 0.2);
            --confluence-color: rgba(251, 191, 36, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #23232e;
            --tier-aplus: #fbbf24;
            --win-color: #22c55e;
            --loss-color: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        aside {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .brand {
            padding: 20px;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
            background: rgba(59,130,246,0.05);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            margin-top: 10px;
        }

        /* Symbol List */
        .symbol-item {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 4px;
            transition: all 0.2s;
        }
        .symbol-item:hover { background: #1e293b; }
        .symbol-item.active { background: rgba(59,130,246,0.1); color: var(--accent-color); }

        /* Trade List */
        .trade-item {
            padding: 12px;
            background: #1a1a20;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: transform 0.1s;
        }
        .trade-item:hover { transform: translateX(4px); border-color: #334155; }
        .trade-item.WIN { border-left: 4px solid var(--win-color); }
        .trade-item.LOSS { border-left: 4px solid var(--loss-color); }

        .trade-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .trade-time { color: var(--text-secondary); font-size: 0.75rem; }
        .trade-result { font-weight: 600; }
        .trade-result.WIN { color: var(--win-color); }
        .trade-result.LOSS { color: var(--loss-color); }
        .tier-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            background: #23232e;
            color: var(--text-secondary);
        }
        .tier-aplus { color: var(--tier-aplus); border: 1px solid var(--tier-aplus); }

        /* Equity Wrapper */
        #equity-chart {
            height: 100px;
            margin-bottom: 20px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Main Area Styling */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
        }

        #chart-wrapper {
            flex: 1;
            position: relative;
        }

        #chart-container { width: 100%; height: 100%; }

        .overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 50;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <aside>
        <div class="brand">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            SMC DASHBOARD
        </div>

        <div class="sidebar-tabs">
            <button class="tab-btn active" onclick="switchTab('explorer')">Explorer</button>
            <button class="tab-btn" onclick="switchTab('trades')">Trade Log</button>
        </div>

        <div id="explorer-content" class="sidebar-content">
            <div class="section-label">Inventory</div>
            <div id="symbol-list"></div>
        </div>

        <div id="trades-content" class="sidebar-content" style="display: none;">
            <div class="section-label">Equity Curve</div>
            <div id="equity-chart"></div>
            
            <div class="section-label">History</div>
            <div id="trade-list"></div>
        </div>
    </aside>

    <main>
        <div id="chart-wrapper">
            <div id="chart-container"></div>
            <div id="overlay" class="overlay" style="display: none;">
                <div class="spinner"></div>
                <div id="status-msg" style="font-size: 0.9rem; color: var(--text-secondary);">Loading...</div>
            </div>
        </div>
    </main>

    <script>
        let allSymbols = {};
        let tradeLog = [];
        let activeSymbol = null;
        let activeTf = null;
        let chart = null;
        let candleSeries = null;
        let volumeSeries = null;
        
        let fvgBullSeries = null;
        let fvgBearSeries = null;
        let obSeries = null;
        
        let priceLines = [];

        let equityChart = null;
        let equitySeries = null;

        function initCharts() {
            // Main Chart
            const container = document.getElementById('chart-container');
            chart = LightweightCharts.createChart(container, {
                layout: { background: { color: '#0b0b0e' }, textColor: '#94a3b8' },
                grid: { vertLines: { color: '#1e293b' }, horzLines: { color: '#1e293b' } },
                timeScale: { borderColor: '#1e293b', timeVisible: true, secondsVisible: false },
                rightPriceScale: { borderColor: '#1e293b' }
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#22c55e', downColor: '#ef4444', 
                borderUpColor: '#22c55e', borderDownColor: '#ef4444',
                wickUpColor: '#22c55e', wickDownColor: '#ef4444',
            });

            volumeSeries = chart.addHistogramSeries({
                color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: '', 
            });
            volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.8, bottom: 0 } });

            // Setup Overlay Series (using candlesticks to simulate boxes)
            const commonZoneOptions = {
                wickVisible: false, borderVisible: false, 
                priceLineVisible: false, highlightEnabled: false,
                pane: 0
            };
            fvgBullSeries = chart.addCandlestickSeries({...commonZoneOptions, upColor: 'rgba(34, 197, 94, 0.2)', downColor: 'rgba(34, 197, 94, 0.1)'});
            fvgBearSeries = chart.addCandlestickSeries({...commonZoneOptions, upColor: 'rgba(239, 68, 68, 0.2)', downColor: 'rgba(239, 68, 68, 0.1)'});
            obSeries = chart.addCandlestickSeries({...commonZoneOptions, upColor: 'rgba(59, 130, 246, 0.25)', downColor: 'rgba(59, 130, 246, 0.25)'});

            // Equity Sparkline
            const equityContainer = document.getElementById('equity-chart');
            equityChart = LightweightCharts.createChart(equityContainer, {
                layout: { background: { color: '#000' }, textColor: '#475569' },
                grid: { vertLines: { visible: false }, horzLines: { visible: false } },
                timeScale: { visible: false },
                rightPriceScale: { visible: false },
                handleScroll: false, handleScale: false
            });
            equitySeries = equityChart.addLineSeries({ color: '#22c55e', lineWidth: 2 });

            window.addEventListener('resize', () => {
                chart.resize(container.clientWidth, container.clientHeight);
                equityChart.resize(equityContainer.clientWidth, equityContainer.clientHeight);
            });
            chart.resize(container.clientWidth, container.clientHeight);
            equityChart.resize(equityContainer.clientWidth, equityContainer.clientHeight);
        }

        async function loadCoreData() {
            try {
                console.log("Fetching symbols...");
                // Fetch symbols
                const sResp = await fetch('/api/list_data');
                allSymbols = await sResp.json();
                console.log("Symbols received:", allSymbols);
                renderSymbols();

                console.log("Fetching trades...");
                // Fetch trades
                const tResp = await fetch('/api/list_trades');
                tradeLog = await tResp.json();
                console.log("Trades received:", tradeLog.length);
                renderTrades();
                updateEquityCurve();
            } catch (err) {
                console.error("Data load failed:", err);
                document.getElementById('symbol-list').innerHTML = `<div style="color:red; padding:10px;">Error: ${err.message}</div>`;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(tab)));
            document.getElementById('explorer-content').style.display = tab === 'explorer' ? 'block' : 'none';
            document.getElementById('trades-content').style.display = tab === 'trades' ? 'block' : 'none';
        }

        function renderSymbols() {
            const list = document.getElementById('symbol-list');
            list.innerHTML = '';
            Object.keys(allSymbols).forEach(s => {
                const div = document.createElement('div');
                div.className = 'symbol-item';
                div.innerText = s.replace('_', '/');
                div.onclick = () => {
                    activeSymbol = s;
                    document.querySelectorAll('.symbol-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                    loadCandles(s, '1h');
                };
                list.appendChild(div);
            });
        }

        function renderTrades() {
            const list = document.getElementById('trade-list');
            list.innerHTML = '';
            tradeLog.forEach((t, idx) => {
                // Determine field names
                const result = t.Result || t.result || "Unknown";
                const pnl = parseFloat(t.PnL || t.pnl || 0);
                const entryTime = t['Entry Time'] || t['entry_time'] || "";
                const symbol = t.Symbol || t.symbol || "";
                const strategy = t['Entry Type'] || t['strategy'] || "";
                const tier = t.setup_tier || "B";

                const div = document.createElement('div');
                div.className = `trade-item ${result}`;
                div.innerHTML = `
                    <div class="trade-header">
                        <span class="trade-result ${result}">${result} (${pnl > 0 ? '+' : ''}${pnl.toFixed(2)}$)</span>
                        <span class="tier-badge ${tier === 'A++' ? 'tier-aplus' : ''}">${tier}</span>
                    </div>
                    <div style="font-size: 0.75rem; color: #94a3b8">${symbol} | ${strategy}</div>
                    <div class="trade-time">${entryTime}</div>
                `;
                div.onclick = () => jumpToTrade(t);
                list.appendChild(div);
            });
        }

        function updateEquityCurve() {
            if (tradeLog.length === 0) return;
            const data = [{ time: 0, value: 1000 }]; // Assuming 1000 start
            let current = 1000;
            tradeLog.forEach((t, i) => {
                const acct = t.Account || t.account;
                if (acct) {
                    current = parseFloat(acct);
                    data.push({ time: i + 1, value: current });
                }
            });
            equitySeries.setData(data);
            equityChart.timeScale().fitContent();
        }

        async function loadCandles(symbol, tf) {
            document.getElementById('overlay').style.display = 'block';
            activeSymbol = symbol;
            activeTf = tf;
            
            const url = `/prev_candles/${symbol}/${tf}.csv`;
            const resp = await fetch(url);
            const text = await resp.text();
            
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const candles = [];
            const volumes = [];
            
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 5) continue;
                const row = {}; headers.forEach((h, idx) => row[h] = cols[idx]);
                const time = new Date(row.timestamp).getTime() / 1000;
                if (isNaN(time)) continue;
                
                const o = parseFloat(row.open), h = parseFloat(row.high), l = parseFloat(row.low), c = parseFloat(row.close), v = parseFloat(row.volume || 0);
                candles.push({ time, open: o, high: h, low: l, close: c });
                volumes.push({ time, value: v, color: c >= o ? 'rgba(34, 197, 94, 0.3)' : 'rgba(239, 68, 68, 0.3)' });
            }

            candleSeries.setData(candles);
            volumeSeries.setData(volumes);
            await loadOverlays(symbol, tf, candles);
            chart.timeScale().fitContent();
            document.getElementById('overlay').style.display = 'none';
        }

        async function loadOverlays(symbol, tf, candles) {
            fvgBullSeries.setData([]);
            fvgBearSeries.setData([]);
            obSeries.setData([]);

            const resp = await fetch(`/api/get_overlays?symbol=${symbol}&tf=${tf}`);
            const data = await resp.json();
            
            // Map zones to candle timestamps
            const candleTimes = candles.map(c => c.time);
            
            const bullData = [];
            const bearData = [];
            const obData = [];

            data.fvgs.forEach(fvg => {
                // Draw for next 5 candles after start (approximate visualization)
                const startIdx = candleTimes.findIndex(t => t >= fvg.start);
                if (startIdx !== -1) {
                    for (let j = 0; j < 6; j++) {
                        if (startIdx + j >= candleTimes.length) break;
                        const d = { time: candleTimes[startIdx + j], open: fvg.top, high: fvg.top, low: fvg.btm, close: fvg.btm };
                        if (fvg.type === 'bull') bullData.push(d);
                        else bearData.push(d);
                    }
                }
            });

            data.obs.forEach(ob => {
                const startIdx = candleTimes.findIndex(t => t >= ob.start);
                if (startIdx !== -1) {
                    for (let j = 0; j < 15; j++) {
                        if (startIdx + j >= candleTimes.length) break;
                        obData.push({ time: candleTimes[startIdx + j], open: ob.top, high: ob.top, low: ob.btm, close: ob.btm });
                    }
                }
            });

            fvgBullSeries.setData(bullData);
            fvgBearSeries.setData(bearData);
            obSeries.setData(obData);
        }

        async function jumpToTrade(trade) {
            // First clear old lines
            priceLines.forEach(l => candleSeries.removePriceLine(l));
            priceLines = [];

            // 1. Auto-switch symbol if different
            const tradeSymbol = trade['Symbol'].replace('/', '_');
            if (activeSymbol !== tradeSymbol) {
                await loadCandles(tradeSymbol, '5m'); // Go to 5m for trade view
            }
            
            const entryTime = new Date(trade['Entry Time']).getTime() / 1000;
            
            // Draw lines
            const slLine = candleSeries.createPriceLine({
                price: parseFloat(trade['Stop $']), color: '#ef4444', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'SL'
            });
            const tpLine = candleSeries.createPriceLine({
                price: parseFloat(trade['Target $']), color: '#22c55e', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: 'TP'
            });
            const enLine = candleSeries.createPriceLine({
                price: parseFloat(trade['Entry $']), color: '#3b82f6', lineWidth: 2, lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: true, title: 'ENTRY'
            });
            
            priceLines.push(slLine, tpLine, enLine);

            // Scroll to time
            chart.timeScale().setVisibleRange({
                from: entryTime - 3600 * 6, // 6h before
                to: entryTime + 3600 * 12    // 12h after
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            loadCoreData();
        });
    </script>
</body>
</html>
